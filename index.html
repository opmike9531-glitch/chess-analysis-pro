<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #0e0e0e; color: #d4d4d4; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .app-container { display: flex; gap: 20px; align-items: flex-start; }
        #board { width: 450px; border: 2px solid #333; border-radius: 4px; }
        .sidebar { width: 300px; background: #161616; padding: 20px; border-radius: 8px; border: 1px solid #2a2a2a; }
        .eval-bar { width: 30px; background: #222; height: 450px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #333; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.4s; }
        .best-move-box { background: #1f1f1f; padding: 15px; border-radius: 6px; border-left: 4px solid #4caf50; margin-bottom: 20px; }
        #score { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; cursor: pointer; border-radius: 4px; }
        .highlight-best { box-shadow: inset 0 0 3px 3px rgba(76, 175, 80, 0.75); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="eval-bar"><div id="eval-fill"></div></div>

    <div id="board"></div>

    <div class="sidebar">
        <div id="score">0.0</div>
        <div class="best-move-box">
            <span style="font-size: 10px; color: #888;">SUGGESTED MOVE</span>
            <div id="best-move-text" style="font-size: 22px; font-weight: bold;">---</div>
        </div>
        <button onclick="board.start()">Reset Board</button>
        <button onclick="board.flip()" style="margin-top:10px;">Flip Board</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    // NEW PIECE SOURCE: Using a different server to avoid "broken links"
    function pieceTheme (piece) {
        return 'https://raw.githubusercontent.com/jhlywa/chess.js/master/img/chesspieces/wikipedia/' + piece + '.png';
    }

    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            document.getElementById('score').innerText = score > 0 ? "+" + score : score;
            let p = 50 + (score * 10);
            document.getElementById('eval-fill').style.height = Math.max(5, Math.min(95, p)) + "%";
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            document.getElementById('best-move-text').innerText = move.toUpperCase();
            $('.square-55d63').removeClass('highlight-best');
            $('.square-' + move.substring(0, 2)).addClass('highlight-best');
            $('.square-' + move.substring(2, 4)).addClass('highlight-best');
        }
    };

    function onDrop (source, target) {
        if (source === target) return;
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 15');
        }, 100);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });
</script>
</body>
</html>
