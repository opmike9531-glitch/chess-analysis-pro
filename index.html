<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .app { display: flex; gap: 20px; align-items: center; }
        #board { width: 480px; border: 4px solid #1a1a1a; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .eval-bar { width: 35px; background: #222; height: 480px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #333; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.5s ease-out; }
        .sidebar { width: 320px; background: #161616; padding: 25px; border-radius: 10px; border: 1px solid #2a2a2a; }
        #score { font-size: 36px; font-weight: bold; text-align: center; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .suggestion-box { background: #1f1f1f; padding: 15px; border-radius: 8px; border-left: 4px solid #4caf50; }
        .best-move { color: #fff; font-size: 24px; font-weight: bold; font-family: monospace; display: block; margin-top: 5px; }
        button { background: #2a2a2a; color: #fff; border: 1px solid #333; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #333; border-color: #4caf50; }
        .highlight-best { box-shadow: inset 0 0 5px 5px rgba(76, 175, 80, 0.8) !important; }
    </style>
</head>
<body>

<div class="app">
    <div class="eval-bar"><div id="eval-fill"></div></div>
    <div id="board"></div>
    <div class="sidebar">
        <div id="score">0.0</div>
        <div class="suggestion-box">
            <span style="font-size: 11px; color: #888; letter-spacing: 1px;">BEST MOVE</span>
            <span id="best-move-text" class="best-move">---</span>
        </div>
        <button onclick="board.start(); resetUI();">New Game</button>
        <button onclick="board.flip()" style="background: none; border: none; font-size: 12px; color: #555; margin-top: 10px;">Flip Board</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    // Direct link to pieces to prevent "Invisible Piece" bug
    function pieceTheme(piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    const moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_standard/move-self.mp3');

    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            document.getElementById('score').innerText = score > 0 ? "+" + score : score;
            let p = 50 + (score * 10);
            document.getElementById('eval-fill').style.height = Math.max(5, Math.min(95, p)) + "%";
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            document.getElementById('best-move-text').innerText = move.toUpperCase();
            $('.square-55d63').removeClass('highlight-best');
            $('.square-' + move.substring(0, 2)).addClass('highlight-best');
            $('.square-' + move.substring(2, 4)).addClass('highlight-best');
        }
    };

    function onDrop(source, target) {
        if (source === target) return;
        moveSound.play().catch(e => {});
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 15');
        }, 100);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });

    function resetUI() {
        document.getElementById('score').innerText = "0.0";
        document.getElementById('best-move-text').innerText = "---";
        document.getElementById('eval-fill').style.height = "50%";
    }
</script>
</body>
</html>
