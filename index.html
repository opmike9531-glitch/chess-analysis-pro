<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro</title>
    <style>
        body { background: #0e0e0e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { display: flex; gap: 20px; align-items: center; }
        
        /* The Board */
        #board { width: 480px; height: 480px; display: grid; grid-template-columns: repeat(8, 1fr); border: 5px solid #222; }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; position: relative; }
        .white { background: #ebecd0; }
        .black { background: #779556; }
        .piece { width: 50px; height: 50px; cursor: grab; z-index: 10; }
        
        /* Eval Bar */
        .eval-bar { width: 30px; height: 480px; background: #333; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #444; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.5s; }

        /* Sidebar */
        .sidebar { width: 300px; background: #161616; padding: 20px; border-radius: 8px; border: 1px solid #2a2a2a; }
        #score { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .best-move-box { background: #1f1f1f; padding: 15px; border-radius: 6px; border-left: 4px solid #4caf50; }
        .highlight { background: rgba(255, 255, 0, 0.5) !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="eval-bar"><div id="eval-fill"></div></div>
    <div id="board"></div>
    <div class="sidebar">
        <div id="score">0.0</div>
        <div class="best-move-box">
            <span style="font-size: 10px; color: #888;">STOCKFISH SUGGESTION</span>
            <div id="best-move-text" style="font-size: 22px; font-weight: bold; color: #4caf50;">---</div>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; width: 100%; padding: 10px; cursor: pointer;">Reset Game</button>
    </div>
</div>

<script>
    // Self-contained Board Logic (No external libraries needed)
    const boardEl = document.getElementById('board');
    const pieces = {
        'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
        'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
        'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
        'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
        'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
        'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
        'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
        'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
        'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
        'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
        'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg'
    };

    let layout = [
        'r','n','b','q','k','b','n','r',
        'p','p','p','p','p','p','p','p',
        '','','','','','','','',
        '','','','','','','','',
        '','','','','','','','',
        '','','','','','','','',
        'P','P','P','P','P','P','P','P',
        'R','N','B','Q','K','B','N','R'
    ];

    function createBoard() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const square = document.createElement('div');
            const row = Math.floor(i / 8);
            const col = i % 8;
            square.className = `square ${(row + col) % 2 === 0 ? 'white' : 'black'}`;
            square.dataset.index = i;
            
            if (layout[i]) {
                const img = document.createElement('img');
                img.src = pieces[layout[i]];
                img.className = 'piece';
                img.draggable = true;
                img.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', i));
                square.appendChild(img);
            }

            square.addEventListener('dragover', (e) => e.preventDefault());
            square.addEventListener('drop', (e) => {
