<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro - Final</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #0e0e0e; color: #d4d4d4; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .app-container { display: flex; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; justify-content: center; align-items: center; }

        /* EVAL BAR */
        .eval-bar-container { width: 35px; background: #222; height: 500px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #333; }
        #eval-fill { background: #ffffff; width: 100%; height: 50%; transition: height 0.3s ease-out; }

        /* BOARD & ARROWS */
        #board { width: 500px; position: relative; border-radius: 4px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .highlight-best { box-shadow: inset 0 0 3px 3px rgba(76, 175, 80, 0.7); }

        /* SIDEBAR */
        .sidebar { width: 350px; background: #161616; border-radius: 8px; border: 1px solid #2a2a2a; padding: 20px; display: flex; flex-direction: column; height: 500px; box-sizing: border-box; }
        .engine-box { background: #1f1f1f; padding: 15px; border-radius: 6px; border-left: 4px solid #4caf50; margin-bottom: 20px; }
        .best-move { color: #fff; font-size: 24px; font-weight: bold; font-family: monospace; }
        
        #score-display { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 20px; color: #fff; }
        button { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:hover { background: #333; border-color: #4caf50; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="eval-bar-container"><div id="eval-fill"></div></div>

    <div>
        <div id="board"></div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="board.start(); resetUI();">New Game</button>
            <button onclick="board.flip()">Flip</button>
        </div>
    </div>

    <div class="sidebar">
        <div id="score-display">0.0</div>
        <div class="engine-box">
            <span style="font-size: 11px; color: #888;">BEST MOVE</span>
            <span id="best-move-text" class="best-move">---</span>
        </div>
        <textarea id="fen-input" style="background:#000; color:#4caf50; border:1px solid #333; height:60px; padding:10px; margin-bottom:10px;" placeholder="Paste FEN..."></textarea>
        <button onclick="loadFen()">Load FEN</button>
        <div style="margin-top: auto; text-align: center; color: #444; font-size: 10px;">STOCKFISH 11 REAL-TIME</div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    const moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_standard/move-self.mp3');
    const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    
    function pieceTheme(p) { return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + p + '.png'; }

    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            updateEval(score);
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            showSuggestion(move);
        }
    };

    function updateEval(s) {
        document.getElementById('score-display').innerText = s > 0 ? "+" + s : s;
        let p = 50 + (s * 10);
        document.getElementById('eval-fill').style.height = Math.max(2, Math.min(98, p)) + "%";
    }

    function showSuggestion(m) {
        document.getElementById('best-move-text').innerText = m.toUpperCase();
        $('.square-55d63').removeClass('highlight-best');
        let from = m.substring(0, 2);
        let to = m.substring(2, 4);
        $('.square-' + from).addClass('highlight-best');
        $('.square-' + to).addClass('highlight-best');
    }

    function onDrop(source, target, piece) {
        if (source === target) return;
        moveSound.play();
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 15');
        }, 100);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });

    function loadFen() { board.position($('#fen-input').val()); onDrop(); }
    function resetUI() { $('#score-display').text('0.0'); $('#best-move-text').text('---'); $('#eval-fill').css('height', '50%'); }
</script>
</body>
</html>
