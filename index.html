<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 20px; font-size: 24px; font-weight: bold; color: #fff; letter-spacing: 2px; }
        
        .container { display: flex; gap: 30px; padding: 20px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
        
        /* Board Styling */
        #board { width: 500px; border: 4px solid #1a1a1a; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        /* Sidebar Styling */
        .sidebar { width: 300px; background: #161616; border-radius: 8px; border: 1px solid #222; display: flex; flex-direction: column; height: 508px; }
        .sidebar-header { background: #222; padding: 15px; font-weight: bold; text-align: center; border-bottom: 1px solid #333; }
        #move-history { flex-grow: 1; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 14px; color: #aaa; line-height: 2; }
        
        /* Status Bar */
        .status-bar { padding: 15px; background: #1a1a1a; display: flex; justify-content: space-between; border-top: 1px solid #333; }
        #eval-score { font-weight: bold; color: #4caf50; }

        /* Buttons */
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { background: #252525; color: #fff; border: 1px solid #333; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-weight: 600; transition: 0.2s; }
        button:hover { background: #333; border-color: #555; }
        .btn-analyze { background: #4caf50; border: none; }
        .btn-analyze:hover { background: #45a049; }
    </style>
</head>
<body>

    <header>CHESS ANALYSIS PRO</header>

    <div class="container">
        <div id="board"></div>

        <div class="sidebar">
            <div class="sidebar-header">MOVE HISTORY</div>
            <div id="move-history">1. (Wait for move...)</div>
            <div class="status-bar">
                <span>EVAL: <span id="eval-score">0.0</span></span>
                <span id="engine-status">READY</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">RESET</button>
        <button onclick="board.flip()">FLIP</button>
        <button class="btn-analyze" onclick="runAnalysis()">RUN STOCKFISH</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script>
        var moveCount = 1;
        var historyEl = document.getElementById('move-history');

        function pieceTheme (piece) {
            return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
        }

        // Logic to track moves
        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            if (source === target) return;
            let moveStr = piece.toUpperCase() + ": " + source + " → " + target;
            if (moveCount === 1) historyEl.innerHTML = "";
            historyEl.innerHTML += moveCount + ". " + moveStr + "<br>";
            moveCount++;
        }

        var board = Chessboard('board', {
            draggable: true,
            dropOffBoard: 'snapback',
            position: 'start',
            pieceTheme: pieceTheme,
            onDrop: onDrop
        });

        var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        stockfish.onmessage = function(event) {
            if (event.data.includes('score cp')) {
                let parts = event.data.split(' ');
                let score = parts[parts.indexOf('cp') + 1] / 100;
                document.getElementById('eval-score').innerText = score;
                document.getElementById('eval-score').style.color = score >= 0 ? "#4caf50" : "#f44336";
                document.getElementById('engine-status').innerText = "DONE";
            }
        };

        function runAnalysis() {
            document.getElementById('engine-status').innerText = "THINKING...";
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 16');
        }

        function resetGame() {
            board.start();
            historyEl.innerHTML = "1. (Wait for move...)";
            moveCount = 1;
            document.getElementById('eval-score').innerText = "0.0";
        }
    </script>
</body>
</html>
