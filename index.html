<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Pro Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { display: flex; gap: 20px; align-items: center; }
        #board { width: 450px; border: 2px solid #444; border-radius: 4px; background: #222; }
        .eval-bar { width: 30px; background: #333; height: 450px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #444; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.4s; }
        .sidebar { width: 300px; background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        #score { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .highlight-best { box-shadow: inset 0 0 3px 3px rgba(0, 255, 0, 0.7); }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 12px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="eval-bar"><div id="eval-fill"></div></div>
    <div id="board"></div>
    <div class="sidebar">
        <div id="score">0.0</div>
        <div style="background:#222; padding:15px; border-radius:5px; margin-bottom:20px;">
            <small style="color:#888">BEST MOVE</small>
            <div id="best-move" style="font-size:24px; color:#0f0; font-weight:bold;">---</div>
        </div>
        <button onclick="board.start()">Reset Board</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
    // Force pieces to load from a different reliable server
    function pieceTheme (piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    var stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            document.getElementById('score').innerText = score > 0 ? "+" + score : score;
            let p = 50 + (score * 10);
            document.getElementById('eval-fill').style.height = Math.max(5, Math.min(95, p)) + "%";
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            document.getElementById('best-move').innerText = move.toUpperCase();
            $('.square-55d63').removeClass('highlight-best');
            $('.square-' + move.substring(0, 2)).addClass('highlight-best');
            $('.square-' + move.substring(2, 4)).addClass('highlight-best');
        }
    };

    function onDrop (source, target) {
        if (source === target) return;
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 15');
        }, 150);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });
</script>
</body>
</html>
