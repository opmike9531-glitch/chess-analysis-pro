<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analysis Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-wrapper { display: flex; gap: 25px; align-items: center; background: #111; padding: 30px; border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border: 1px solid #222; }
        #board { width: 500px; border: 4px solid #1a1a1a; border-radius: 4px; }
        .eval-bar { width: 35px; height: 500px; background: #222; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #333; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .panel { width: 340px; display: flex; flex-direction: column; gap: 15px; }
        .stat-box { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #2a2a2a; text-align: center; }
        #score { font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .best-move-container { background: #1f291f; padding: 15px; border-radius: 6px; border-left: 5px solid #4caf50; }
        .best-move-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }
        #best-move-text { font-size: 28px; font-weight: bold; color: #4caf50; font-family: monospace; display: block; margin-top: 5px; }
        button { background: #252525; color: #fff; border: 1px solid #333; padding: 14px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #333; border-color: #4caf50; }
        .highlight-move { box-shadow: inset 0 0 5px 5px rgba(76, 175, 80, 0.8) !important; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="eval-bar"><div id="eval-fill"></div></div>
    <div id="board"></div>
    <div class="panel">
        <div class="stat-box">
            <div id="score">0.0</div>
            <div style="font-size: 12px; color: #555;">ENGINE EVALUATION</div>
        </div>
        <div class="best-move-container">
            <span class="best-move-label">Best Suggestion</span>
            <span id="best-move-text">---</span>
        </div>
        <button onclick="board.start(); resetUI();">New Analysis</button>
        <button onclick="board.flip()" style="background:none; border:none; color:#444; font-size:12px;">Flip Board</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    // AUTOMATION: Pieces & Sound
    const moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_standard/move-self.mp3');
    function pieceTheme(piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    // AUTOMATION: Engine Setup
    const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    
    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            document.getElementById('score').innerText = score > 0 ? "+" + score : score;
            let p = 50 + (score * 10);
            document.getElementById('eval-fill').style.height = Math.max(5, Math.min(95, p)) + "%";
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            document.getElementById('best-move-text').innerText = move.toUpperCase();
            $('.square-55d63').removeClass('highlight-move');
            $('.square-' + move.substring(0, 2)).addClass('highlight-move');
            $('.square-' + move.substring(2, 4)).addClass('highlight-move');
        }
    };

    function onDrop(source, target) {
        if (source === target) return;
        moveSound.play().catch(() => {});
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen());
            stockfish.postMessage('go depth 15');
        }, 150);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });

    function resetUI() {
        document.getElementById('score').innerText = "0.0";
        document.getElementById('best-move-text').innerText = "---";
        document.getElementById('eval-fill').style.height = "50%";
    }
</script>
</body>
</html>
