<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Analysis Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { display: flex; gap: 20px; align-items: center; }
        #board { width: 480px; border: 3px solid #2a2a2a; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .eval-bar { width: 35px; background: #333; height: 480px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse; border: 1px solid #444; }
        #eval-fill { background: #fff; width: 100%; height: 50%; transition: height 0.3s ease-out; }
        .sidebar { width: 320px; background: #1c1c1c; padding: 20px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .engine-box { background: #252525; padding: 15px; border-radius: 6px; border-left: 4px solid #4caf50; margin-bottom: 20px; }
        .best-move { color: #4caf50; font-size: 24px; font-weight: bold; font-family: monospace; display: block; }
        #score-text { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        button { background: #333; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #444; border-color: #4caf50; }
        .highlight-best { box-shadow: inset 0 0 5px 5px rgba(76, 175, 80, 0.8) !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="eval-bar"><div id="eval-fill"></div></div>
    <div id="board"></div>
    <div class="sidebar">
        <div id="score-text">0.0</div>
        <div class="engine-box">
            <span style="font-size: 11px; color: #888;">BEST MOVE SUGGESTION</span>
            <span id="best-move-display" class="best-move">---</span>
        </div>
        <button onclick="board.start(); resetUI();">New Game</button>
        <button onclick="board.flip()">Flip Board</button>
        <div style="margin-top: 20px; text-align: center; font-size: 11px; color: #555;">Real-Time Stockfish 11</div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    // These piece links are the most reliable for GitHub Pages
    function pieceTheme(piece) {
        return 'https://chessboardjs.com/img/chesspieces/wikipedia/' + piece + '.png';
    }

    const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    const moveSound = new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_standard/move-self.mp3');

    stockfish.onmessage = function(event) {
        if (event.data.includes('score cp')) {
            let cp = parseInt(event.data.split('cp ')[1]);
            let score = (cp / 100).toFixed(1);
            if (board.fen().includes(' b ')) score = -score;
            document.getElementById('score-text').innerText = score > 0 ? "+" + score : score;
            let p = 50 + (score * 10);
            document.getElementById('eval-fill').style.height = Math.max(5, Math.min(95, p)) + "%";
        }
        if (event.data.includes('bestmove')) {
            let move = event.data.split(' ')[1];
            document.getElementById('best-move-display').innerText = move.toUpperCase();
            $('.square-55d63').removeClass('highlight-best');
            $('.square-' + move.substring(0, 2)).addClass('highlight-best');
            $('.square-' + move.substring(2, 4)).addClass('highlight-best');
        }
    };

    function onDrop(source, target) {
        if (source === target) return;
        moveSound.play().catch(e => {}); // Play sound
        setTimeout(() => {
            stockfish.postMessage('position fen ' + board.fen() + " w KQkq - 0 1");
            stockfish.postMessage('go depth 15');
        }, 100);
    }

    var board = Chessboard('board', {
        draggable: true,
        position: 'start',
        pieceTheme: pieceTheme,
        onDrop: onDrop
    });

    function resetUI() {
        document.getElementById('score-text').innerText = "0.0";
        document.getElementById('best-move-display').innerText = "---";
        document.getElementById('eval-fill').style.height = "50%";
    }
</script>
</body>
</html>
